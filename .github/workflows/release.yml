name: Release desktop app

# Builds the Windows installer and publishes it to ethankaluau/Aegis-releases,
# which is where installed copies of Aegis look for updates.
#
# Deliberately NOT triggered by every push. stocks.js, crypto.js, signals.js,
# funds.js and fundamentals.js are regenerated by the refresh scripts on every
# launch and committed as seed data — building on those would cut a release
# every time the numbers move, for no change in the app. Installed copies
# refresh their own data on launch anyway, so stale seed data costs nothing.
on:
  push:
    branches: [main]
    paths:
      - 'index.html'          # the app itself
      - 'refresh-*.ps1'       # how it fetches data
      - 'desktop/**'          # the shell, updater, packaging
  workflow_dispatch:          # and manually, from the Actions tab

permissions:
  contents: read

# Two releases racing would fight over the same tag.
concurrency:
  group: release-desktop
  cancel-in-progress: false

jobs:
  release:
    runs-on: windows-latest   # NSIS installer needs Windows

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - name: Install build deps
        working-directory: desktop
        run: npm ci

      # Version comes from the run number rather than package.json, because
      # electron-updater ignores a release whose version didn't increase — and
      # hand-bumping is the step that gets forgotten. Starts at 1.1.x so it
      # always beats the hand-built 1.0.1 that was installed manually.
      - name: Set version
        working-directory: desktop
        run: |
          npm version 1.1.${{ github.run_number }} --no-git-tag-version --allow-same-version
          node -p "'publishing v' + require('./package.json').version"

      - name: Build and publish
        working-directory: desktop
        env:
          # A PAT with Contents: read & write on Aegis-releases. The built-in
          # GITHUB_TOKEN cannot write to a different repository.
          GH_TOKEN: ${{ secrets.RELEASES_TOKEN }}
        run: npm run publish
